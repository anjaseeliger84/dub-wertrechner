function doCalc(p){const m=getM(p.br,p.sz);if(!m)return null;const initEbit=p.deep?pN(p.e25||""):p.ebit;if(initEbit<=0)return null;const qA=calcQA({inh:p.inh,kun:p.kun,tr:p.tr,lief:p.lief,zuk:p.zuk});const dA=p.deep?calcDA({rec:p.rec,inv:p.invS}):0;const tA=qA+dA;
let eE=initEbit,eN=null;
if(p.deep){const e3=pN(p.e23||""),e4=pN(p.e24||""),e5=pN(p.e25||"");
if(e5>0&&e4>0&&e3>0){eE=Math.round(e5*.5+e4*.3+e3*.2);eN="Gewichteter Ø: 50%/30%/20%"}
else if(e5>0&&e4>0){eE=Math.round(e5*.6+e4*.4);eN="Gewichteter Ø aus 2 Jahren"}
else if(e5>0)eE=e5;
if(p.gB==="ja"&&pN(p.gBe||"")>0){const g=pN(p.gBe),mk=pN(p.mG||"")||Math.round(g*.6);eE=eE+g-mk;eN=(eN?eN+" · ":"")+"GF-Gehalt bereinigt"}}
const eL=Math.round(eE*m.ebit[0]*(1+tA)),eH=Math.round(eE*m.ebit[1]*(1+tA));
let uL=null,uH=null;if(m.umsatz&&p.um>0){uL=Math.round(p.um*m.umsatz[0]*(1+tA));uH=Math.round(p.um*m.umsatz[1]*(1+tA))}
let fL=uL?Math.round(eL*.7+uL*.3):eL,fH=uH?Math.round(eH*.7+uH*.3):eH;
let sV=null;if(p.deep&&pN(p.sub||"")>0){sV=pN(p.sub);if(fL<sV)fL=sV;if(fH<sV)fH=Math.max(fH,Math.round(sV*1.15))}
let conf=45;if(uL)conf+=10;if(p.deep){if(pN(p.e23||"")>0&&pN(p.e24||"")>0)conf+=15;else if(pN(p.e24||"")>0)conf+=8;if(p.gB==="ja")conf+=8;if(p.rec)conf+=5;if(p.invS)conf+=5;if(sV)conf+=7}
conf=Math.min(95,conf);
return{eR:{l:eL,h:eH},uR:uL?{l:uL,h:uH}:null,cR:{l:fL,h:fH},eE,eN,sV,mL:(m.ebit[0]*(1+tA)).toFixed(1),mH:(m.ebit[1]*(1+tA)).toFixed(1),mUL:m.umsatz?(m.umsatz[0]*(1+tA)).toFixed(2):null,mUH:m.umsatz?(m.umsatz[1]*(1+tA)).toFixed(2):null,isEB:m.isEbitda,qA,dA,tA,conf,deep:p.deep}}

function getRecs(p){const recs=[];
if(p.inh==="hoch")recs.push({icon:iUser,title:"Inhaberabhängigkeit reduzieren",text:"Dein Unternehmen hängt stark von dir persönlich ab. Das ist der häufigste Grund für Wertabschläge bei Nachfolgeprozessen. Beginne frühzeitig damit, Aufgaben und Verantwortung an dein Team zu übergeben und Schlüsselprozesse zu dokumentieren. Ein Unternehmen, das auch ohne den Inhaber funktioniert, ist für Nachfolger deutlich attraktiver.",prio:1});
else if(p.inh==="niedrig")recs.push({icon:iChk,title:"Starke Teamstruktur",text:"Dein Unternehmen läuft auch ohne dich. Das ist ein großer Pluspunkt bei jeder Nachfolgeregelung und wirkt sich positiv auf den Unternehmenswert aus.",prio:3});
if(p.kun==="konzentriert")recs.push({icon:iTarget,title:"Kundenkonzentration entschärfen",text:"Eine starke Abhängigkeit von wenigen Kunden ist ein Risiko für potenzielle Nachfolger. Versuche, deinen Kundenstamm schrittweise zu diversifizieren. Selbst kleine Fortschritte (z.B. kein einzelner Kunde über 20% Umsatzanteil) machen dein Unternehmen deutlich attraktiver.",prio:1});

else if(p.tr==="wachsend")recs.push({icon:iUp,title:"Wachstumskurs nutzen",text:"Dein Unternehmen wächst. Das ist die beste Ausgangslage für eine Nachfolge: Käufer zahlen eine Prämie für Unternehmen mit positivem Trend. Nutze den Schwung und beginne den Prozess, solange die Zahlen für dich sprechen.",prio:3});
if(p.zuk==="rückläufig"&&p.tr!=="rückläufig")recs.push({icon:iAlert,title:"Erwarteten Rückgang vorbereiten",text:"Du rechnest mit einem Rückgang im kommenden Jahr. Falls du eine Nachfolge in Betracht ziehst, kann es sinnvoll sein, den Prozess zeitnah zu starten, solange die aktuellen Zahlen noch eine gute Basis bieten.",prio:2});
if(p.rec==="niedrig")recs.push({icon:iRefresh,title:"Wiederkehrende Umsätze aufbauen",text:"Überwiegend Projektgeschäft bedeutet weniger Planungssicherheit für einen Nachfolger. Wartungsverträge, Service-Vereinbarungen oder Rahmenverträge können den Anteil planbarer Umsätze erhöhen und steigern den Unternehmenswert messbar.",prio:2});
else if(p.rec==="hoch")recs.push({icon:iChk,title:"Starke wiederkehrende Umsätze",text:"Über 60% wiederkehrende Umsätze sind ein starkes Signal für potenzielle Nachfolger. Planbare Einnahmen reduzieren das Risiko und rechtfertigen einen höheren Kaufpreis.",prio:3});
if(p.invS==="hoch")recs.push({icon:iBuild,title:"Investitionsstau kommunizieren",text:"Erheblicher Investitionsbedarf in den nächsten Jahren wird Nachfolger berücksichtigen. Erstelle eine transparente Übersicht der anstehenden Investitionen mit Kostenschätzungen. Transparenz schafft Vertrauen und verhindert böse Überraschungen während der Verhandlung.",prio:2});
if(p.checkAns&&p.checkAns.length===8){const a=p.checkAns;

if(a[2]+a[4]<=4)recs.push({icon:iChart,title:"Finanzielle Transparenz herstellen",text:"Gute Finanzkenntnisse und dokumentierte Prozesse sind die Grundlage jeder erfolgreichen Nachfolge. Lass deinen Jahresabschluss aufbereiten, dokumentiere deine Prozesse und verschaff dir einen klaren Überblick über alle relevanten Kennzahlen. Das stärkt deine Verhandlungsposition enorm.",prio:1});
if(a[3]+a[6]<=4)recs.push({icon:iSh,title:"Absicherung und Unabhängigkeit stärken",text:"Dein Unternehmen wäre gefährdet, wenn du unerwartet ausfällst. Regle die Vertretung, erteile Prokura oder Handlungsvollmachten und erstelle einen Notfallplan. Das schützt nicht nur dein Lebenswerk, sondern zeigt potenziellen Nachfolgern auch eine professionelle Unternehmensführung.",prio:1});
if(a[5]+a[7]<=4)recs.push({icon:iBulb,title:"Persönliche Perspektive klären",text:"Die Frage, was nach dem Unternehmen kommt, ist genauso wichtig wie die Nachfolge selbst. Viele Unternehmer unterschätzen, wie schwer das Loslassen fällt. Nimm dir bewusst Zeit, über deine Pläne für die Zeit nach der Übergabe nachzudenken. Das macht den gesamten Prozess leichter.",prio:2});
if(a[5]+a[7]>=7)recs.push({icon:iChk,title:"Starke persönliche Bereitschaft",text:"Du hast eine klare Vorstellung von deiner Zukunft nach dem Unternehmen. Das ist ein wichtiger Erfolgsfaktor: Unternehmer, die wissen, worauf sie sich freuen, führen Nachfolgeprozesse deutlich erfolgreicher.",prio:3});}
recs.sort((a,b)=>a.prio-b.prio);

function RG({options,value,onChange}){const[h,sH]=useState(null);return<div style={{display:"flex",flexDirection:"column",gap:9}}>{options.map(o=><button key={o.value} onClick={()=>onChange(o.value)} onMouseOver={()=>sH(o.value)} onMouseOut={()=>sH(null)} style={{background:value===o.value?C.sunken:h===o.value?C.surface:C.bg,color:C.text,border:`1.5px solid ${value===o.value?C.navy:C.border}`,borderRadius:10,padding:"14px 16px",fontSize:15,cursor:"pointer",textAlign:"left",transition:"all .15s",lineHeight:1.45,display:"flex",alignItems:"center",gap:12,fontFamily:"inherit",minHeight:48}}><span style={{width:20,height:20,borderRadius:"50%",flexShrink:0,border:`1.5px solid ${value===o.value?C.navy:C.borderInput}`,background:value===o.value?C.navy:"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}}>{value===o.value&&<Ico d={iChk} size={10} color="#FFF"/>}</span><div><div style={{fontWeight:value===o.value?600:500}}>{o.label}</div>{o.desc&&<div style={{fontSize:13,color:C.muted,marginTop:2}}>{o.desc}</div>}</div></button>)}</div>}

function Scale({options,value,onChange}){const disp=[...options].reverse();const n=disp.length;const ramp=n===3?["#C2410C","#B7791F","#2E7D55"]:disp.map(()=>C.navy);return<div><div style={{display:"flex",alignItems:"center",marginBottom:10}}>{disp.map((o,i)=>{const sel=value===o.value;const col=ramp[i];return<React.Fragment key={o.value}>{i>0&&<div style={{flex:1,height:2,background:C.border,minWidth:14}}/>}<button onClick={()=>onChange(o.value)} style={{flexShrink:0,background:"none",border:"none",padding:0,cursor:"pointer",display:"flex"}}><span style={{width:sel?40:34,height:sel?40:34,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:sel?16:14,fontWeight:700,background:sel?col:"#fff",color:sel?"#fff":col,border:`2px solid ${col}`,boxShadow:sel?`0 0 0 4px ${col}26`:"none",transition:"all .15s"}}>{i+1}</span></button></React.Fragment>;})}</div><div style={{display:"flex",justifyContent:"space-between",gap:8}}>{disp.map((o,i)=><span key={o.value} onClick={()=>onChange(o.value)} style={{flex:1,fontSize:12,lineHeight:1.35,cursor:"pointer",textAlign:i===0?"left":i===n-1?"right":"center",color:value===o.value?C.navy:C.muted,fontWeight:value===o.value?600:400}}>{o.label}</span>)}</div></div>;}
function IF({label,hint,value,onChange,suffix,small}){const[f,sF]=useState(false);return<div style={{marginBottom:small?14:22}}><label style={{fontSize:small?14:15,fontWeight:600,color:C.navy,display:"block",marginBottom:6}}>{label}</label>{hint&&<p style={{fontSize:13,color:C.muted,margin:"0 0 8px",lineHeight:1.5}}>{hint}</p>}<div style={{position:"relative"}}><input type="text" inputMode="numeric" value={value} onChange={onChange} onFocus={()=>sF(true)} onBlur={()=>sF(false)} style={{width:"100%",padding:small?"12px 55px 12px 14px":"14px 60px 14px 16px",fontSize:small?15:17,borderRadius:8,border:`1.5px solid ${f?C.navy:C.borderInput}`,boxSizing:"border-box",fontFamily:"inherit",transition:"border-color .2s",color:C.text}}/>{suffix&&<span style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",fontSize:13,color:C.muted}}>{suffix}</span>}</div></div>}

function RB({label,low,high,color,mx}){const s=mx||high*1.3;return<div style={{marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:13,color:C.muted}}>{label}</span><span style={{fontSize:13,fontWeight:600,color}}>{fmt(low)} – {fmt(high)}</span></div><div style={{height:6,background:C.sunken,borderRadius:3,position:"relative"}}><div style={{position:"absolute",left:`${(low/s)*100}%`,width:`${Math.max(2,((high-low)/s)*100)}%`,height:6,borderRadius:3,background:color,transition:"all .6s ease"}}/></div></div>}

function CM({value}){const col=value>=75?C.success:value>=55?C.navy:C.muted;const lab=value>=75?"Hohe Aussagekraft":value>=55?"Gute Aussagekraft":"Grobe Schätzung";return<div style={{marginBottom:16}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:13,color:C.muted}}>Genauigkeit</span><span style={{fontSize:12,fontWeight:600,color:col}}>{lab} ({value}%)</span></div><div style={{height:6,background:C.sunken,borderRadius:3}}><div style={{height:6,borderRadius:3,background:col,width:`${value}%`,transition:"width .6s"}}/></div></div>}
